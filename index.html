<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>א.ד. אינסטלציה | מחשבונים הנדסיים</title>
<meta name="description" content="כלי חישוב הנדסי מקצועי לאינסטלטורים לפי ת״י 1205 והל״ת">
<meta name="theme-color" content="#0a0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1a;--bg2:#111827;--card:rgba(255,255,255,0.045);--card2:rgba(255,255,255,0.08);--bdr:rgba(255,255,255,0.1);--focus:rgba(56,189,248,0.5);--sky:#38bdf8;--sky2:#0ea5e9;--skyG:rgba(56,189,248,0.22);--grn:#34d399;--red:#f87171;--amb:#fbbf24;--ora:#fb923c;--wa:#25D366;--t1:#f8fafc;--t2:#e2e8f0;--t3:#b0bec5;--t4:#78909c;--t5:#546e7a;--r:14px;--rs:10px;}
.light{--bg:#f0f2f5;--bg2:#ffffff;--card:rgba(0,0,0,0.04);--card2:rgba(0,0,0,0.07);--bdr:rgba(0,0,0,0.12);--focus:rgba(14,165,233,0.4);--t1:#0f172a;--t2:#1e293b;--t3:#475569;--t4:#64748b;--t5:#94a3b8;--skyG:rgba(14,165,233,0.15);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;-webkit-user-select:none;-moz-user-select:none;user-select:none;}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--t2);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:76px;transition:background .3s,color .3s;}
input,textarea,select{-webkit-user-select:text;user-select:text;}
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,15,26,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);padding:10px 16px;transition:background .3s;}
.light .hdr{background:rgba(240,242,245,0.92);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;max-width:820px;margin:0 auto;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ico{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--sky),var(--sky2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 18px var(--skyG);flex-shrink:0;}
.logo h1{font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.3px;}
.logo p{font-size:10px;color:var(--t4);font-weight:500;margin-top:2px;}
.hdr-actions{display:flex;align-items:center;gap:8px;}
.ver{font-size:10px;font-weight:700;color:var(--sky);background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);padding:4px 12px;border-radius:20px;}
.theme-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--bdr);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,15,26,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bdr);padding:4px 2px;padding-bottom:max(4px,env(safe-area-inset-bottom));}
.light .bnav{background:rgba(255,255,255,0.96);}
.bnav-inner{display:flex;justify-content:space-around;width:100%;max-width:820px;margin:0 auto;overflow-x:auto;scrollbar-width:none;}
.bn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 1px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:9px;font-weight:600;color:var(--t5);transition:all .15s;width:11%;}
.bn.on{color:var(--sky);}
.bn-i{font-size:17px;width:32px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:7px;}
.mn{max-width:820px;margin:0 auto;padding:16px 14px 20px;}
.sec{display:none;}.sec.on{display:block;animation:fadeUp .2s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.stit{font-size:17px;font-weight:800;color:var(--t1);margin-bottom:4px;}
.sdsc{font-size:13px;color:var(--t4);margin-bottom:16px;line-height:1.5;}
.fld{margin-bottom:13px;}
.flbl{display:block;font-size:13px;color:var(--t3);font-weight:600;margin-bottom:5px;}
.iw{display:flex;align-items:center;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);overflow:hidden;}
.iw input,.iw select{flex:1;background:none;border:none;outline:none;padding:12px 13px;color:var(--t1);font-family:inherit;font-size:17px;font-weight:600;text-align:right;}
.iu{padding:0 11px;font-size:12px;color:var(--t4);border-right:1px solid var(--bdr);font-weight:600;white-space:nowrap;}
.bg{display:grid;gap:7px;}.bg4{grid-template-columns:repeat(4,1fr);}.bg2{grid-template-columns:repeat(2,1fr);}
.gb{padding:11px 5px;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--card);color:var(--t3);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;}
.gb.on{background:var(--sky);color:#fff;border-color:transparent;}
.rc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;margin-top:13px;}
.mets{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px;}
.met{background:rgba(128,128,128,.06);border-radius:var(--rs);padding:11px 5px;text-align:center;}
.mv{font-size:21px;font-weight:900;line-height:1.1;}
.ml{font-size:10px;color:var(--t4);margin-top:3px;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:11px;padding:11px;border-radius:var(--rs);border:1px solid rgba(37,211,102,.3);background:rgba(37,211,102,.08);color:var(--wa);font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;}
.rt{width:100%;border-collapse:collapse;font-size:13px;}
.rt th{text-align:right;padding:9px 7px;color:var(--t4);border-bottom:1px solid var(--bdr);}
.rt td{padding:9px 7px;border-bottom:1px solid rgba(128,128,128,.08);color:var(--t2);}
.tool-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.timer-display{font-size:48px;font-weight:900;color:var(--t1);text-align:center;}
</style>
</head>
<body>
<header class="hdr"><div class="hdr-top"><div class="logo"><div class="logo-ico">🔧</div><div><h1>א.ד. אינסטלציה</h1><p>מחשבונים הנדסיים · ת"י 1205 · הל"ת</p></div></div><div class="hdr-actions"><button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button><span class="ver">v4.1</span></div></div></header>
<main class="mn">
  <div class="sec on" id="s-slope"><div class="stit">מחשבון שיפועים</div><div class="sdsc">חישוב הפרש גובה ועומק חפירה · H = L × S</div>
  <div class="fld"><span class="flbl">קוטר צנרת</span><div class="bg bg4" id="sl-dia"><button class="gb" data-v="50">50 מ"מ</button><button class="gb" data-v="75">75 מ"מ</button><button class="gb on" data-v="110">110 מ"מ</button><button class="gb" data-v="160">160 מ"מ</button></div></div>
  <div class="fld"><span class="flbl">אורך הצנרת</span><div class="iw"><input type="number" id="sl-len" placeholder="הזן אורך" step="0.1" inputmode="decimal"><span class="iu">מטר</span></div></div>
  <div id="sl-res"></div></div>
  </main>
<nav class="bnav"><div class="bnav-inner" id="bnav">
<button class="bn on" data-t="slope"><div class="bn-i">📐</div><div class="bn-l">שיפועים</div></button>
<button class="bn" data-t="tools"><div class="bn-i">🛠️</div><div class="bn-l">עזרים</div></button>
<button class="bn" data-t="price"><div class="bn-i">💰</div><div class="bn-l">מחירון</div></button>
<button class="bn" data-t="chat"><div class="bn-i">💬</div><div class="bn-l">מהנדס</div></button>
</div></nav>
<script>
// חסימות בסיסיות ללא תקיעת הדף
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if(e.key==='F12' || (e.ctrlKey && e.shiftKey && 'IJCK'.indexOf(e.key.toUpperCase())>-1)) e.preventDefault();
});

function toggleTheme(){
    document.body.classList.toggle('light');
    document.getElementById('themeBtn').textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
}

// ניווט טאבים
var bns=document.querySelectorAll('.bn');
bns.forEach(b => {
    b.addEventListener('click', () => {
        bns.forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
        const target = document.getElementById('s-'+b.dataset.t);
        if(target) target.classList.add('on');
    });
});

// פונקציית חישוב שיפוע פשוטה להדגמה (ניתן להוסיף את המלאה)
document.getElementById('sl-len').addEventListener('input', function(){
    var L = parseFloat(this.value);
    var e = document.getElementById('sl-res');
    if(!L) {e.innerHTML=''; return;}
    var H = L * 1.5;
    e.innerHTML = '<div class="rc"><div class="mets"><div class="met"><div class="mv">'+H.toFixed(1)+'</div><div class="ml">הפרש (ס"מ)</div></div></div></div>';
});
</script>
</body>
</html>

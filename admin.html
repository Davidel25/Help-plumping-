<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>א.ד. אינסטלציה | לוח ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f9fb;--card:#fff;--bdr:#e2e8f0;--sky:#0ea5e9;--skyL:#e0f2fe;--grn:#10b981;--red:#ef4444;--amb:#f59e0b;--t1:#0f172a;--t2:#334155;--t3:#64748b;--t4:#94a3b8;--r:12px;--rs:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--t2);min-height:100vh;}
.top-bar{background:#fff;border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.top-bar h1{font-size:18px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:8px;}
.top-bar h1 span{font-size:22px;}
.save-btn{padding:10px 24px;border-radius:var(--rs);border:none;background:var(--sky);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.save-btn:hover{background:#0284c7;}.save-btn:active{transform:scale(.97);}
.save-ok{background:var(--grn)!important;}
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:220px;background:#fff;border-left:1px solid var(--bdr);padding:16px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t3);transition:all .15s;border-right:3px solid transparent;}
.sb-item:hover{background:var(--skyL);color:var(--sky);}
.sb-item.on{background:var(--skyL);color:var(--sky);border-right-color:var(--sky);font-weight:700;}
.sb-item .sb-ico{font-size:17px;width:24px;text-align:center;}
.sb-count{margin-right:auto;background:var(--bdr);color:var(--t3);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.content{flex:1;padding:24px 28px;max-width:900px;}
.page{display:none;}.page.on{display:block;animation:fadeIn .2s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.page-title{font-size:20px;font-weight:800;color:var(--t1);margin-bottom:6px;}
.page-desc{font-size:13px;color:var(--t4);margin-bottom:20px;}
.section-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sc-title{font-size:15px;font-weight:700;color:var(--t1);}

/* Forms */
.form-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.form-group label{font-size:11px;font-weight:600;color:var(--t3);}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--bdr);border-radius:var(--rs);font-family:inherit;font-size:14px;color:var(--t1);outline:none;transition:border-color .15s;background:#fff;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--sky);}
.form-group textarea{resize:vertical;min-height:60px;}

/* Item list */
.item-list{border:1px solid var(--bdr);border-radius:var(--rs);overflow:hidden;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);transition:background .1s;}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:#f8fafc;}
.item-row .ir-drag{cursor:grab;color:var(--t4);font-size:14px;}
.item-row .ir-name{flex:1;font-size:13px;font-weight:600;color:var(--t1);}
.item-row .ir-meta{font-size:12px;color:var(--t4);display:flex;align-items:center;gap:6px;}
.item-row .ir-price{font-size:14px;font-weight:800;color:var(--sky);}
.item-row .ir-cat{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;background:var(--skyL);color:var(--sky);}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:var(--t2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:#f1f5f9;}.btn:active{transform:scale(.97);}
.btn-sky{background:var(--skyL);color:var(--sky);border-color:rgba(14,165,233,.2);}
.btn-red{color:var(--red);border-color:rgba(239,68,68,.2);}
.btn-red:hover{background:rgba(239,68,68,.05);}
.btn-grn{background:rgba(16,185,129,.08);color:var(--grn);border-color:rgba(16,185,129,.2);}
.btn-sm{padding:5px 10px;font-size:11px;}
.add-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--rs);border:2px dashed var(--bdr);background:none;color:var(--t4);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;justify-content:center;margin-top:10px;}
.add-btn:hover{border-color:var(--sky);color:var(--sky);background:var(--skyL);}

/* Edit modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;display:none;}
.modal-overlay.on{display:flex;}
.modal{background:#fff;border-radius:var(--r);padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-title{font-size:17px;font-weight:800;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--t3);}
.modal-close:hover{background:var(--bdr);}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid var(--bdr);border-radius:var(--rs);padding:16px;text-align:center;}
.stat .sv{font-size:28px;font-weight:900;color:var(--sky);}
.stat .sl{font-size:11px;color:var(--t4);margin-top:4px;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#0f172a;color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:13px;font-weight:600;z-index:600;transition:transform .3s ease;display:flex;align-items:center;gap:8px;box-shadow:0 10px 30px rgba(0,0,0,.2);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none;}
  .layout{flex-direction:column;}
  .content{padding:16px;}
  .mob-nav{display:flex;overflow-x:auto;gap:4px;padding:8px 12px;background:#fff;border-bottom:1px solid var(--bdr);scrollbar-width:none;}
  .mob-nav::-webkit-scrollbar{display:none;}
  .mob-nav .mn-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--bdr);background:#fff;color:var(--t3);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .mob-nav .mn-btn.on{background:var(--sky);color:#fff;border-color:var(--sky);}
}
@media(min-width:769px){.mob-nav{display:none;}}
</style>
</head>
<body>

<div class="top-bar">
  <h1><span>🔧</span> לוח ניהול · א.ד. אינסטלציה</h1>
  <button class="save-btn" id="saveBtn" onclick="saveAll()">💾 שמור שינויים</button>
</div>

<div class="mob-nav" id="mobNav"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="content" id="content"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>

  {id:'settings',ico:'⚙️',name:'הגדרות',desc:'הגדרות כלליות'}

// ── DEFAULT DATA ──
var DEFAULTS={

    {cat:'fix',name:'תיקון דליפה מדוד שמש',price:400},
    {cat:'fix',name:'תיקון צנרת תת-רצפתית',price:800},

    {cat:'install',name:'התקנת דוד חשמלי',price:600},

    {cat:'replace',name:'החלפת ברז מטבח',price:350},
    {cat:'replace',name:'החלפת מנגנון שטיפה',price:300},
    {cat:'replace',name:'החלפת סיפון',price:180},
    {cat:'replace',name:'החלפת גמיש',price:150},
    {cat:'replace',name:'החלפת צנרת PPR (מטר)',price:200},
    {cat:'replace',name:'החלפת אינטרפוץ',price:600},
    {cat:'block',name:'פתיחת סתימה בכיור',price:250},
    {cat:'block',name:'פתיחת סתימה באסלה',price:300},
    {cat:'block',name:'פתיחת סתימה ראשית',price:500},
    {cat:'block',name:'פתיחת סתימה במכונה חשמלית',price:600},
    {cat:'block',name:'שטיפת קו בלחץ',price:700},
    {cat:'block',name:'צילום קו במצלמה',price:500},
    {cat:'other',name:'ביקור + אבחון',price:200},
    {cat:'other',name:'בדיקת לחץ מים',price:150},
    {cat:'other',name:'איתור נזילה עם ציוד',price:500},
    {cat:'other',name:'קריאת חירום (שבת/חג)',price:500},
    {cat:'other',name:'קריאת חירום (לילה)',price:450}
  ],
  faults:[
    {icon:'🔊',title:'רעשי גרגור בצנרת',symptoms:'רעש בועות בהזרמה',causes:'חוסר אוורור|שיפוע חד מדי|חסימה חלקית',solution:'התקן נשם AAV · ודא שיפוע 1.5%-2% ל-110מ"מ'},
    {icon:'💧',title:'דליפה בחיבורים',symptoms:'רטיבות, טפטוף',causes:'חיבור לקוי|לחץ מעל 5 בר|סדק מקפאון',solution:'PRV אם מעל 5 בר · הלחמת PPR 260°C'},
    {icon:'🚽',title:'שטיפה חלשה',symptoms:'מים זורמים לאט',causes:'לחץ נמוך|מנגנון פגום|שיפוע לא מספיק',solution:'בדוק לחץ · החלף מנגנון · כבל ספירלי'},
    {icon:'🔨',title:'פטיש מים',symptoms:'חבטות בסגירת ברז',causes:'לחץ גבוה|צנרת לא מעוגנת',solution:'Arrestor · PRV · עיגון כל 1.5מ\''},
    {icon:'🦠',title:'ריח ביוב',symptoms:'ריח ביוב מהניקוז',causes:'סיפון יבש|חוסר אוורור|סיפון סדוק',solution:'שפוך מים · נשם · מחסום 50מ"מ'}
  ],

    {title:'💧 דליפה',text:'הדליפה יכולה להיגרם מלחץ מים גבוה מדי או מחיבור ישן שנשחק. מומלץ להתקין וסת לחץ ולהחליף את החיבור הפגום.'},
    {title:'🦠 ריח ביוב',text:'הריח עולה כי מחסום המים בסיפון התייבש. שפכו כוס מים ובדקו שהסיפון תקין.'},
    {title:'🔨 רעש חבטות',text:'הרעש קורה כשסוגרים ברז בחדות. הפתרון הוא להתקין בולם זעזועים ולבדוק שלחץ המים לא גבוה מדי.'},
    {title:'🚽 שטיפה חלשה',text:'שטיפה חלשה נגרמת מלחץ מים נמוך או ממנגנון שטיפה ישן. צריך לבדוק לחץ, מנגנון, וחסימות.'}
  ],
  heights:[
    {name:'ניאגרה סמויה',height:'100',note:'מרכז לחצן'},
    {name:'יציאת ביוב אסלה',height:'18',note:'מרכז צנרת'},
    {name:'אינטרפוץ מקלחת',height:'110-120',note:'מרצפה גמורה'},
    {name:'ברז כיור רחצה',height:'105',note:'מרצפה גמורה'},
    {name:'ברז מטבח',height:'105',note:'מעל השיש'},
    {name:'יציאת מכ"כ',height:'75',note:'מרצפה גמורה'},
    {name:'גובה כיור',height:'80-85',note:'חלק עליון'}
  ],
  drying:[
    {name:'דבק PVC',wait:'5 דק\'',full:'2 שעות'},
    {name:'דבק CPVC',wait:'10 דק\'',full:'4 שעות'},
    {name:'סיליקון',wait:'30 דק\'',full:'24 שעות'},
    {name:'טפלון חוט',wait:'מיידי',full:'מיידי'},
    {name:'אפוקסי',wait:'60 דק\'',full:'24 שעות'},
    {name:'PPR (הלחמה)',wait:'מיידי',full:'3 דק\' קירור'},
    {name:'מלט אינסטלציה',wait:'4 שעות',full:'24-48 שעות'},
    {name:'איטום ביטומני',wait:'2 שעות',full:'24 שעות'},
    {name:'פוליאוריתן',wait:'45 דק\'',full:'24 שעות'}
  ],
  settings:{businessName:'א.ד. אינסטלציה',phone:'',whatsappPrefix:'א.ד. אינסטלציה'}
};

var CATS={fix:'תיקונים',install:'התקנות',replace:'החלפות',block:'סתימות',other:'שונות'};

// ── DATA MANAGEMENT ──
var data={};
function loadData(){try{var s=localStorage.getItem('ad_plumbing_cms');if(s){data=JSON.parse(s);}else{data=JSON.parse(JSON.stringify(DEFAULTS));}}catch(e){data=JSON.parse(JSON.stringify(DEFAULTS));}}
function saveAll(){try{localStorage.setItem('ad_plumbing_cms',JSON.stringify(data));var b=document.getElementById('saveBtn');b.classList.add('save-ok');b.innerHTML='✅ נשמר!';setTimeout(function(){b.classList.remove('save-ok');b.innerHTML='💾 שמור שינויים';},2000);showToast('✅ כל השינויים נשמרו בהצלחה');}catch(e){showToast('❌ שגיאה בשמירה');}}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function resetToDefaults(){if(confirm('האם לאפס את כל הנתונים לברירת מחדל?')){data=JSON.parse(JSON.stringify(DEFAULTS));saveAll();renderPage(currentPage);}}

// ── NAVIGATION ──
var currentPage='dashboard';
function initNav(){
  var sb=document.getElementById('sidebar'),mn=document.getElementById('mobNav');
  PAGES.forEach(function(p){
    // Sidebar
    var d=document.createElement('div');d.className='sb-item'+(p.id===currentPage?' on':'');d.dataset.page=p.id;
    d.innerHTML='<span class="sb-ico">'+p.ico+'</span>'+p.name;
    d.addEventListener('click',function(){navTo(p.id);});sb.appendChild(d);
    // Mobile nav
    var b=document.createElement('button');b.className='mn-btn'+(p.id===currentPage?' on':'');b.dataset.page=p.id;
    b.textContent=p.ico+' '+p.name;
    b.addEventListener('click',function(){navTo(p.id);});mn.appendChild(b);
  });
}
function navTo(id){
  currentPage=id;
  document.querySelectorAll('.sb-item,.mn-btn').forEach(function(el){el.classList.toggle('on',el.dataset.page===id);});
  renderPage(id);
}
function renderPage(id){
  var c=document.getElementById('content');
  switch(id){
    case 'dashboard':renderDashboard(c);break;
    case 'prices':renderPrices(c);break;
    case 'faults':renderFaults(c);break;
    case 'client':renderClient(c);break;
    case 'heights':renderHeights(c);break;
    case 'drying':renderDrying(c);break;
    case 'standards':renderStandards(c);break;
    case 'settings':renderSettings(c);break;
  }
}

// ── MODAL ──
function openModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modal').classList.add('on');}
function closeModal(){document.getElementById('modal').classList.remove('on');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── RENDER: DASHBOARD ──
function renderDashboard(c){
  var np=data.prices?data.prices.length:0,nf=data.faults?data.faults.length:0,nc=data.clientTexts?data.clientTexts.length:0;
  var avgPrice=0;if(np){var sum=0;data.prices.forEach(function(p){sum+=p.price;});avgPrice=Math.round(sum/np);}
  c.innerHTML='<div class="page on"><div class="page-title">📊 דשבורד</div><div class="page-desc">סקירה כללית של התוכן באפליקציה</div>'
    +'<div class="stats"><div class="stat"><div class="sv">'+np+'</div><div class="sl">עבודות במחירון</div></div><div class="stat"><div class="sv">'+nf+'</div><div class="sl">תקלות מתועדות</div></div><div class="stat"><div class="sv">'+nc+'</div><div class="sl">הסברי לקוח</div></div><div class="stat"><div class="sv">₪'+avgPrice+'</div><div class="sl">מחיר ממוצע</div></div></div>'
    +'<div class="section-card"><div class="sc-title">פעולות מהירות</div><div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="btn btn-sky" onclick="navTo(\'prices\')">💰 ערוך מחירון</button><button class="btn btn-sky" onclick="navTo(\'faults\')">⚠️ ערוך תקלות</button><button class="btn btn-sky" onclick="navTo(\'client\')">👤 הסברי לקוח</button><button class="btn btn-red" onclick="resetToDefaults()">↺ אפס לברירת מחדל</button></div></div></div>';
}

// ── RENDER: PRICES ──
function renderPrices(c){
  var html='<div class="page on"><div class="page-title">💰 ניהול מחירון</div><div class="page-desc">הוסף, ערוך ומחק עבודות ומחירים</div>';
  var catCounts={};Object.keys(CATS).forEach(function(k){catCounts[k]=0;});
  if(data.prices)data.prices.forEach(function(p){if(catCounts[p.cat]!==undefined)catCounts[p.cat]++;});
  html+='<div class="stats">';Object.keys(CATS).forEach(function(k){html+='<div class="stat"><div class="sv">'+catCounts[k]+'</div><div class="sl">'+CATS[k]+'</div></div>';});html+='</div>';
  // List by category
  Object.keys(CATS).forEach(function(cat){
    var items=(data.prices||[]).filter(function(p){return p.cat===cat;});
    html+='<div class="section-card"><div class="sc-header"><div class="sc-title">'+CATS[cat]+' ('+items.length+')</div></div><div class="item-list">';
    items.forEach(function(item){
      var idx=data.prices.indexOf(item);
      html+='<div class="item-row"><div class="ir-name">'+esc(item.name)+'</div><div class="ir-price">₪'+item.price+'</div><button class="btn btn-sm btn-sky" onclick="editPrice('+idx+')">✏️</button><button class="btn btn-sm btn-red" onclick="delPrice('+idx+')">🗑️</button></div>';
    });
    html+='</div><button class="add-btn" onclick="addPrice(\''+cat+'\')">+ הוסף עבודה חדשה</button></div>';
  });
  html+='</div>';c.innerHTML=html;
}
function editPrice(idx){
  var p=data.prices[idx];
  openModal('<div class="modal-title"><span>✏️ עריכת עבודה</span><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="form-group"><label>שם העבודה</label><input id="ep-name" value="'+esc(p.name)+'"></div>'
    +'<div class="form-row"><div class="form-group"><label>מחיר (₪)</label><input type="number" id="ep-price" value="'+p.price+'"></div>'
    +'<div class="form-group"><label>קטגוריה</label><select id="ep-cat">'+Object.keys(CATS).map(function(k){return '<option value="'+k+'"'+(k===p.cat?' selected':'')+'>'+CATS[k]+'</option>';}).join('')+'</select></div></div>'
    +'<div class="modal-actions"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn btn-sky" onclick="savePrice('+idx+')">💾 שמור</button></div>');
}
function savePrice(idx){
  data.prices[idx].name=document.getElementById('ep-name').value;
  data.prices[idx].price=parseInt(document.getElementById('ep-price').value)||0;
  data.prices[idx].cat=document.getElementById('ep-cat').value;
  closeModal();renderPrices(document.getElementById('content'));showToast('✅ עבודה עודכנה');
}
function delPrice(idx){if(confirm('למחוק את "'+data.prices[idx].name+'"?')){data.prices.splice(idx,1);renderPrices(document.getElementById('content'));showToast('🗑️ נמחק');}}
function addPrice(cat){
  openModal('<div class="modal-title"><span>+ עבודה חדשה</span><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="form-group"><label>שם העבודה</label><input id="ep-name" placeholder="תיאור העבודה"></div>'
    +'<div class="form-row"><div class="form-group"><label>מחיר (₪)</label><input type="number" id="ep-price" placeholder="0"></div>'
    +'<div class="form-group"><label>קטגוריה</label><select id="ep-cat">'+Object.keys(CATS).map(function(k){return '<option value="'+k+'"'+(k===cat?' selected':'')+'>'+CATS[k]+'</option>';}).join('')+'</select></div></div>'
    +'<div class="modal-actions"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn btn-grn" onclick="doAddPrice()">+ הוסף</button></div>');
}
function doAddPrice(){
  var n=document.getElementById('ep-name').value,p=parseInt(document.getElementById('ep-price').value)||0,cat=document.getElementById('ep-cat').value;
  if(!n){showToast('⚠️ הזן שם');return;}data.prices.push({cat:cat,name:n,price:p});closeModal();renderPrices(document.getElementById('content'));showToast('✅ עבודה נוספה');
}

// ── RENDER: FAULTS ──
function renderFaults(c){
  var html='<div class="page on"><div class="page-title">⚠️ ניהול תקלות</div><div class="page-desc">ערוך את מדריך התקלות שמופיע באפליקציה</div>';

    +'<div style="font-size:12px;color:#64748b;line-height:1.7"><strong>סימפטומים:</strong> '+esc(f.symptoms)+'<br><strong>סיבות:</strong> '+esc(f.causes)+'<br><strong>פתרון:</strong> '+esc(f.solution)+'</div></div>';
  });

}
function editFault(i){var f=data.faults[i];openModal('<div class="modal-title"><span>✏️ עריכת תקלה</span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="form-row"><div class="form-group" style="max-width:60px"><label>אייקון</label><input id="ef-ico" value="'+f.icon+'" maxlength="2"></div><div class="form-group"><label>כותרת</label><input id="ef-title" value="'+esc(f.title)+'"></div></div><div class="form-group"><label>סימפטומים</label><input id="ef-sym" value="'+esc(f.symptoms)+'"></div><div class="form-group"><label>סיבות (הפרד ב-|)</label><input id="ef-causes" value="'+esc(f.causes)+'"></div><div class="form-group"><label>פתרון</label><textarea id="ef-sol">'+esc(f.solution)+'</textarea></div><div class="modal-actions"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn btn-sky" onclick="saveFault('+i+')">💾 שמור</button></div>');}
function saveFault(i){data.faults[i]={icon:document.getElementById('ef-ico').value,title:document.getElementById('ef-title').value,symptoms:document.getElementById('ef-sym').value,causes:document.getElementById('ef-causes').value,solution:document.getElementById('ef-sol').value};closeModal();renderFaults(document.getElementById('content'));showToast('✅ תקלה עודכנה');}
function delFault(i){if(confirm('למחוק?')){data.faults.splice(i,1);renderFaults(document.getElementById('content'));showToast('🗑️ נמחק');}}
function addFault(){openModal('<div class="modal-title"><span>+ תקלה חדשה</span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="form-row"><div class="form-group" style="max-width:60px"><label>אייקון</label><input id="ef-ico" value="🔧" maxlength="2"></div><div class="form-group"><label>כותרת</label><input id="ef-title" placeholder="שם התקלה"></div></div><div class="form-group"><label>סימפטומים</label><input id="ef-sym" placeholder="תיאור הסימפטום"></div><div class="form-group"><label>סיבות (הפרד ב-|)</label><input id="ef-causes" placeholder="סיבה1|סיבה2"></div><div class="form-group"><label>פתרון</label><textarea id="ef-sol" placeholder="פתרון מעשי"></textarea></div><div class="modal-actions"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn btn-grn" onclick="doAddFault()">+ הוסף</button></div>');}
function doAddFault(){data.faults.push({icon:document.getElementById('ef-ico').value,title:document.getElementById('ef-title').value,symptoms:document.getElementById('ef-sym').value,causes:document.getElementById('ef-causes').value,solution:document.getElementById('ef-sol').value});closeModal();renderFaults(document.getElementById('content'));showToast('✅ תקלה נוספה');}

// ── RENDER: SETTINGS ──
function renderSettings(c){
  var s=data.settings||DEFAULTS.settings;
  c.innerHTML='<div class="page on"><div class="page-title">⚙️ הגדרות</div><div class="page-desc">הגדרות כלליות של האפליקציה</div><div class="section-card"><div class="sc-title">פרטי העסק</div><div class="form-group" style="margin-top:12px"><label>שם העסק</label><input id="st-name" value="'+esc(s.businessName)+'" onchange="data.settings.businessName=this.value"></div><div class="form-group"><label>טלפון</label><input id="st-phone" value="'+esc(s.phone||'')+'" placeholder="050-0000000" onchange="data.settings.phone=this.value"></div><div class="form-group"><label>פתיח הודעת ווטסאפ</label><input id="st-wa" value="'+esc(s.whatsappPrefix)+'" onchange="data.settings.whatsappPrefix=this.value"></div></div><div class="section-card"><div class="sc-title">ניהול נתונים</div><div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="btn btn-sky" onclick="exportData()">📤 ייצוא נתונים (JSON)</button><button class="btn" onclick="document.getElementById(\'importFile\').click()">📥 ייבוא נתונים</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"><button class="btn btn-red" onclick="resetToDefaults()">↺ אפס לברירת מחדל</button></div></div></div>';
}
function exportData(){var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ad-plumbing-data.json';a.click();showToast('📤 נתונים יוצאו');}
function importData(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{data=JSON.parse(ev.target.result);saveAll();renderPage(currentPage);showToast('📥 נתונים יובאו בהצלחה');}catch(err){showToast('❌ קובץ לא תקין');}};r.readAsText(f);}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';}

loadData();initNav();renderPage('dashboard');

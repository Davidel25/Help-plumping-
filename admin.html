<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>א.ד. אינסטלציה | לוח ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f9fb;--card:#fff;--bdr:#e2e8f0;--sky:#0ea5e9;--skyL:#e0f2fe;--grn:#10b981;--red:#ef4444;--amb:#f59e0b;--t1:#0f172a;--t2:#334155;--t3:#64748b;--t4:#94a3b8;--r:12px;--rs:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--t2);min-height:100vh;}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#0f172a,#1e293b);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-overlay.hidden{display:none;}
.login-box{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo .ico{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#0ea5e9);display:inline-flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 6px 20px rgba(56,189,248,.3);margin-bottom:12px;}
.login-logo h2{font-size:20px;font-weight:800;color:var(--t1);}
.login-logo p{font-size:12px;color:var(--t4);margin-top:4px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--t3);margin-bottom:5px;}
.login-field input{width:100%;padding:12px 14px;border:1px solid var(--bdr);border-radius:var(--rs);font-family:inherit;font-size:15px;color:var(--t1);outline:none;transition:border-color .2s;}
.login-field input:focus{border-color:var(--sky);}
.login-btn{width:100%;padding:13px;border-radius:var(--rs);border:none;background:var(--sky);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.login-btn:active{transform:scale(.98);}
.login-error{margin-top:10px;padding:10px;border-radius:var(--rs);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:var(--red);font-size:12px;font-weight:600;display:none;text-align:center;}
.login-lockout{color:var(--amb);background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.15);}
.top-bar{background:#fff;border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.top-bar h1{font-size:18px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:8px;}
.top-actions{display:flex;align-items:center;gap:8px;}
.save-btn{padding:10px 20px;border-radius:var(--rs);border:none;background:var(--sky);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.save-btn:active{transform:scale(.97);}
.logout-btn{padding:10px 14px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:var(--red);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:220px;background:#fff;border-left:1px solid var(--bdr);padding:16px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t3);transition:all .15s;border-right:3px solid transparent;}
.sb-item:hover{background:var(--skyL);color:var(--sky);}
.sb-item.on{background:var(--skyL);color:var(--sky);border-right-color:var(--sky);font-weight:700;}
.sb-item .sb-ico{font-size:17px;width:24px;text-align:center;}
.content{flex:1;padding:24px 28px;max-width:900px;}
.page{display:none;}.page.on{display:block;animation:fadeIn .2s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.page-title{font-size:20px;font-weight:800;color:var(--t1);margin-bottom:6px;}
.page-desc{font-size:13px;color:var(--t4);margin-bottom:20px;}
.section-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:6px;}
.sc-title{font-size:15px;font-weight:700;color:var(--t1);}
.form-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.form-group label{font-size:11px;font-weight:600;color:var(--t3);}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--bdr);border-radius:var(--rs);font-family:inherit;font-size:14px;color:var(--t1);outline:none;background:#fff;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--sky);}
.form-group textarea{resize:vertical;min-height:60px;}
.item-list{border:1px solid var(--bdr);border-radius:var(--rs);overflow:hidden;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:#f8fafc;}
.item-row .ir-name{flex:1;font-size:13px;font-weight:600;color:var(--t1);}
.item-row .ir-meta{font-size:12px;color:var(--t4);display:flex;align-items:center;gap:6px;}
.item-row .ir-price{font-size:14px;font-weight:800;color:var(--sky);}
.btn{padding:8px 16px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:var(--t2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:#f1f5f9;}.btn:active{transform:scale(.97);}
.btn-sky{background:var(--skyL);color:var(--sky);border-color:rgba(14,165,233,.2);}
.btn-red{color:var(--red);border-color:rgba(239,68,68,.2);}
.btn-grn{background:rgba(16,185,129,.08);color:var(--grn);border-color:rgba(16,185,129,.2);}
.btn-sm{padding:5px 10px;font-size:11px;}
.add-btn{display:flex;align-items:center;gap:6px;padding:10px;border-radius:var(--rs);border:2px dashed var(--bdr);background:none;color:var(--t4);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%;justify-content:center;margin-top:10px;}
.add-btn:hover{border-color:var(--sky);color:var(--sky);background:var(--skyL);}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.on{display:flex;}
.modal{background:#fff;border-radius:var(--r);padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-title{font-size:17px;font-weight:800;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--t3);}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid var(--bdr);border-radius:var(--rs);padding:16px;text-align:center;}
.stat .sv{font-size:28px;font-weight:900;color:var(--sky);}
.stat .sl{font-size:11px;color:var(--t4);margin-top:4px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#0f172a;color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:13px;font-weight:600;z-index:600;transition:transform .3s ease;box-shadow:0 10px 30px rgba(0,0,0,.2);}
.toast.show{transform:translateX(-50%) translateY(0);}
.user-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:var(--skyL);color:var(--sky);font-size:11px;font-weight:600;}
.editor-note{margin-top:8px;padding:8px 12px;border-radius:var(--rs);background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);font-size:11px;color:var(--amb);font-weight:500;}
.std-edit-note{background:rgba(14,165,233,.06);border:1px solid rgba(14,165,233,.15);border-radius:var(--rs);padding:10px 12px;margin-top:8px;}
.std-edit-note label{font-size:10px;font-weight:600;color:var(--sky);display:block;margin-bottom:4px;}
.std-edit-note textarea{width:100%;border:1px solid var(--bdr);border-radius:6px;padding:8px;font-family:inherit;font-size:12px;color:var(--t1);resize:vertical;min-height:40px;outline:none;}
.std-edit-note textarea:focus{border-color:var(--sky);}
.report-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.04);color:var(--red);font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;margin-top:6px;}
.report-btn:active{transform:scale(.95);}
@media(max-width:768px){.sidebar{display:none;}.layout{flex-direction:column;}.content{padding:16px;}.mob-nav{display:flex;overflow-x:auto;gap:4px;padding:8px 12px;background:#fff;border-bottom:1px solid var(--bdr);scrollbar-width:none;}.mob-nav::-webkit-scrollbar{display:none;}.mob-nav .mn-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--bdr);background:#fff;color:var(--t3);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}.mob-nav .mn-btn.on{background:var(--sky);color:#fff;border-color:var(--sky);}.top-actions{gap:4px;}.save-btn{padding:8px 12px;font-size:12px;}.logout-btn{padding:8px 10px;font-size:11px;}}
@media(min-width:769px){.mob-nav{display:none;}}
</style>
</head>
<body>

<div class="login-overlay" id="loginScreen">
<div class="login-box"><div class="login-logo"><div class="ico">🔧</div><h2>לוח ניהול</h2><p>א.ד. אינסטלציה · גישה מורשית בלבד</p></div>
<div class="login-field"><label>שם משתמש</label><input type="text" id="loginUser" placeholder="שם משתמש" autocomplete="username"></div>
<div class="login-field"><label>סיסמה</label><input type="password" id="loginPass" placeholder="סיסמה" autocomplete="current-password"></div>
<button class="login-btn" onclick="doLogin()">🔐 כניסה</button>
<div class="login-error" id="loginError"></div></div></div>

<div id="adminPanel" style="display:none">
<div class="top-bar"><h1><span>🔧</span> לוח ניהול</h1><div class="top-actions"><div class="user-badge" id="userBadge">👤</div><button class="save-btn" id="saveBtn" onclick="saveAll()">💾 שמור</button><button class="logout-btn" onclick="doLogout()">🚪 יציאה</button></div></div>
<div class="mob-nav" id="mobNav"></div>
<div class="layout"><aside class="sidebar" id="sidebar"></aside><div class="content" id="content"></div></div>
</div>

<div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script>
// ═══ AUTH ═══
var AK='ad_plumbing_auth',SK='ad_plumbing_session',LK='ad_plumbing_lockout',MAX_ATT=5,LOCK_MIN=15,SESS_HR=24;
function hp(p){var h=0;for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return 'h_'+Math.abs(h).toString(36)+'_'+p.length;}
function gA(){try{var a=localStorage.getItem(AK);if(a)return JSON.parse(a);}catch(e){}var d={user:'admin',pass:hp('ad2024')};localStorage.setItem(AK,JSON.stringify(d));return d;}
function cLO(){try{var l=localStorage.getItem(LK);if(!l)return false;var d=JSON.parse(l);if(d.until>Date.now())return d;localStorage.removeItem(LK);}catch(e){}return false;}
function addFail(){try{var k='ad_plumbing_attempts',a=JSON.parse(localStorage.getItem(k)||'{"count":0,"first":0}');if(Date.now()-a.first>LOCK_MIN*60000){a={count:0,first:Date.now()};}a.count++;if(a.count===1)a.first=Date.now();localStorage.setItem(k,JSON.stringify(a));if(a.count>=MAX_ATT){localStorage.setItem(LK,JSON.stringify({until:Date.now()+LOCK_MIN*60000}));localStorage.removeItem(k);return true;}return false;}catch(e){return false;}}
function gFC(){try{return JSON.parse(localStorage.getItem('ad_plumbing_attempts')||'{"count":0}').count;}catch(e){return 0;}}
function cSess(){var s={token:'s_'+Math.random().toString(36).substr(2),expires:Date.now()+SESS_HR*3600000};localStorage.setItem(SK,JSON.stringify(s));return s;}
function chkSess(){try{var s=JSON.parse(localStorage.getItem(SK));if(s&&s.expires>Date.now())return true;localStorage.removeItem(SK);}catch(e){}return false;}
function doLogin(){var err=document.getElementById('loginError');var lo=cLO();if(lo){var m=Math.ceil((lo.until-Date.now())/60000);err.textContent='⏳ ננעל. נסה בעוד '+m+' דק\'';err.className='login-error login-lockout';err.style.display='block';return;}var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;if(!u||!p){err.textContent='⚠️ הזן שם וסיסמה';err.style.display='block';return;}var a=gA();if(u===a.user&&hp(p)===a.pass){localStorage.removeItem('ad_plumbing_attempts');cSess();showAdmin(u);}else{var locked=addFail();if(locked){err.textContent='🔒 ננעל ל-'+LOCK_MIN+' דק\'';err.className='login-error login-lockout';}else{err.textContent='❌ שגוי ('+(MAX_ATT-gFC())+' נותרו)';err.className='login-error';}err.style.display='block';document.getElementById('loginPass').value='';}}
function doLogout(){localStorage.removeItem(SK);document.getElementById('adminPanel').style.display='none';document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';document.getElementById('loginError').style.display='none';}
function showAdmin(u){document.getElementById('loginScreen').classList.add('hidden');document.getElementById('adminPanel').style.display='';document.getElementById('userBadge').textContent='👤 '+u;}
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('loginUser').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginPass').focus();});
if(chkSess()){showAdmin(gA().user);}

// ═══ DATA ═══
var CATS={fix:'תיקונים',install:'התקנות',replace:'החלפות',block:'סתימות',other:'שונות'};
var DEFAULTS={
prices:[{cat:'fix',name:'תיקון נזילה קטנה (גלוי)',price:250},{cat:'fix',name:'תיקון נזילה בקיר (עם פתיחה)',price:550},{cat:'fix',name:'תיקון שטף אסלה',price:200},{cat:'fix',name:'תיקון ברז מטפטף',price:180},{cat:'fix',name:'תיקון דליפה מדוד שמש',price:400},{cat:'fix',name:'תיקון צנרת תת-רצפתית',price:800},{cat:'fix',name:'תיקון מנגנון ניאגרה',price:280},{cat:'fix',name:'תיקון אינטרפוץ',price:350},{cat:'install',name:'התקנת אסלה חדשה',price:450},{cat:'install',name:'התקנת כיור רחצה',price:350},{cat:'install',name:'התקנת כיור מטבח',price:400},{cat:'install',name:'התקנת מקלחון',price:500},{cat:'install',name:'התקנת ברז מטבח',price:250},{cat:'install',name:'התקנת דוד חשמלי',price:600},{cat:'install',name:'התקנת מכונת כביסה/כלים',price:250},{cat:'install',name:'התקנת נשם (AAV)',price:200},{cat:'install',name:'התקנת ממעט לחץ (PRV)',price:350},{cat:'install',name:'התקנת ניאגרה סמויה',price:800},{cat:'install',name:'התקנת אינטרפוץ',price:500},{cat:'install',name:'התקנת משאבת לחץ',price:1200},{cat:'replace',name:'החלפת אסלה (כולל פירוק)',price:650},{cat:'replace',name:'החלפת ברז מטבח',price:350},{cat:'replace',name:'החלפת מנגנון שטיפה',price:300},{cat:'replace',name:'החלפת סיפון',price:180},{cat:'replace',name:'החלפת גמיש',price:150},{cat:'replace',name:'החלפת צנרת PPR (מטר)',price:200},{cat:'replace',name:'החלפת אינטרפוץ',price:600},{cat:'block',name:'פתיחת סתימה בכיור',price:250},{cat:'block',name:'פתיחת סתימה באסלה',price:300},{cat:'block',name:'פתיחת סתימה ראשית',price:500},{cat:'block',name:'פתיחת סתימה במכונה חשמלית',price:600},{cat:'block',name:'שטיפת קו בלחץ',price:700},{cat:'block',name:'צילום קו במצלמה',price:500},{cat:'other',name:'ביקור + אבחון',price:200},{cat:'other',name:'בדיקת לחץ מים',price:150},{cat:'other',name:'איתור נזילה עם ציוד',price:500},{cat:'other',name:'קריאת חירום (שבת/חג)',price:500},{cat:'other',name:'קריאת חירום (לילה)',price:450}],
faults:[
{icon:'🔊',title:'רעשי גרגור בצנרת ניקוז',symptoms:'רעש בועות וגרגור בזמן שטיפת אסלה או ריקון כיור',causes:'חוסר אוורור – אין נשם או קולטן קרוב|שיפוע חד מדי שגורם לשאיבת סיפון|חסימה חלקית בצנרת שמפריעה לזרימת אוויר',solution:'בדוק מרחק אוורור לפי הל"ת · התקן נשם AAV · ודא שיפוע 1.5%-2% ל-110מ"מ · שטוף צנרת אם יש חסימה'},
{icon:'💧',title:'דליפה מחיבורי צנרת',symptoms:'טפטוף, רטיבות בקירות או תקרה, כתמי מים',causes:'חיבור PPR שלא הולחם כראוי|לחץ מים מעל 5 בר שמפעיל עומס|חומרי איטום לא מתאימים (טפלון ישן)|סדק בצנרת כתוצאה מקפאון בחורף',solution:'בדוק לחץ כניסה · התקן PRV אם מעל 5 בר · החלף חיבור פגום · PPR – הלחמה מחדש ב-260°C · בחורף – בדד צנרת חשופה'},
{icon:'🚽',title:'שטיפה חלשה באסלה',symptoms:'מים זורמים לאט, שטיפה לא מפנה את התכולה, צריך ללחוץ פעמיים',causes:'לחץ מים נמוך מ-1.0 בר|מצוף תקוע או מכוון נמוך מדי|מנגנון שטיפה ישן או פגום|חסימה חלקית בצנרת 110 מ"מ|שיפוע ניקוז לא מספיק',solution:'בדוק לחץ בנקודה (מינ\' 1.0 בר) · כוון מצוף · החלף מנגנון שטיפה · בדוק שיפוע (1.5%-2%) · שטוף עם כבל ספירלי'},

function editSeptic(){
  var s=data.standards.septic;
  openModal('<div class="modal-title"><span>✏️ מכל רקב</span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="form-group"><label>מרחק מינימלי מגבול מגרש</label><input id="sp-d" value="'+esc(s.minDistance)+'"></div><div class="form-group"><label>נפח מינימלי</label><input id="sp-v" value="'+esc(s.minVolume)+'"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn btn-sky" onclick="saveSeptic()">💾</button></div>');
}
function saveSeptic(){
  data.standards.septic.minDistance=document.getElementById('sp-d').value;
  data.standards.septic.minVolume=document.getElementById('sp-v').value;
  closeModal();rStd(document.getElementById('content'));showToast('✅');
}

function clearReports(){if(confirm('נקה כל הדיווחים?')){data.standards.errorReports=[];rStd(document.getElementById('content'));showToast('🗑️');}}

// ═══ SECURITY ═══
function rSec(c){var a=gA();c.innerHTML='<div class="page on"><div class="page-title">🔐 אבטחה</div><div class="page-desc">ניהול התחברות</div><div class="section-card"><div class="sc-title">👤 שם משתמש</div><div class="form-group" style="margin-top:12px"><label>נוכחי</label><input value="'+esc(a.user)+'" disabled style="background:#f1f5f9;color:#94a3b8"></div><div class="form-group"><label>חדש</label><input id="sec-u" placeholder="3+ תווים"></div><div style="margin-top:12px"><button class="btn btn-sky" onclick="chgUser()">💾 עדכן</button></div></div><div class="section-card"><div class="sc-title">🔑 סיסמה</div><div class="form-group" style="margin-top:12px"><label>נוכחית</label><input type="password" id="sec-op"></div><div class="form-group"><label>חדשה (4+)</label><input type="password" id="sec-np"></div><div class="form-group"><label>אימות</label><input type="password" id="sec-np2"></div><div style="margin-top:12px"><button class="btn btn-sky" onclick="chgPass()">🔑 עדכן</button></div></div><div class="section-card"><div class="sc-title">🛡️ מידע</div><div style="font-size:13px;color:#475569;line-height:1.8;margin-top:8px">• נעילה אחרי '+MAX_ATT+' ניסיונות ל-'+LOCK_MIN+' דק\'<br>• Session: '+SESS_HR+' שעות<br>• סיסמה מוצפנת</div></div></div>';}
function chgUser(){var n=document.getElementById('sec-u').value.trim();if(!n||n.length<3)return showToast('⚠️ 3+ תווים');var a=gA();a.user=n;localStorage.setItem(AK,JSON.stringify(a));document.getElementById('userBadge').textContent='👤 '+n;showToast('✅ משתמש: '+n);rSec(document.getElementById('content'));}
function chgPass(){var op=document.getElementById('sec-op').value,np=document.getElementById('sec-np').value,np2=document.getElementById('sec-np2').value,a=gA();if(hp(op)!==a.pass)return showToast('❌ סיסמה שגויה');if(np.length<4)return showToast('⚠️ 4+ תווים');if(np!==np2)return showToast('⚠️ לא תואמות');a.pass=hp(np);localStorage.setItem(AK,JSON.stringify(a));showToast('✅ סיסמה עודכנה');rSec(document.getElementById('content'));}

// ═══ SETTINGS ═══
function rSet(c){var s=data.settings||DEFAULTS.settings;c.innerHTML='<div class="page on"><div class="page-title">⚙️ הגדרות</div><div class="section-card"><div class="sc-title">פרטי העסק</div><div class="form-group" style="margin-top:12px"><label>שם</label><input id="st-n" value="'+esc(s.businessName)+'" onchange="data.settings.businessName=this.value"></div><div class="form-group"><label>טלפון</label><input id="st-p" value="'+esc(s.phone||'')+'" onchange="data.settings.phone=this.value"></div><div class="form-group"><label>פתיח ווטסאפ</label><input id="st-w" value="'+esc(s.whatsappPrefix)+'" onchange="data.settings.whatsappPrefix=this.value"></div></div><div class="section-card"><div class="sc-title">נתונים</div><div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="btn btn-sky" onclick="expData()">📤 ייצוא</button><button class="btn" onclick="document.getElementById(\'impF\').click()">📥 ייבוא</button><input type="file" id="impF" accept=".json" style="display:none" onchange="impData(event)"><button class="btn btn-red" onclick="resetToDefaults()">↺ אפס</button></div></div></div>';}
function expData(){var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ad-plumbing-data.json';a.click();showToast('📤');}
function impData(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{data=JSON.parse(ev.target.result);saveAll();renderPage(curPage);showToast('📥 יובא');}catch(err){showToast('❌');}};r.readAsText(f);}

// ═══ INIT ═══
loadData();initNav();renderPage('dashboard');
</script>
</body>
</html>

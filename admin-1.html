/* ── LOGIN SCREEN ── */

.login-box{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);}

.login-logo .ico{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#0ea5e9);display:inline-flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 6px 20px rgba(56,189,248,.3);margin-bottom:12px;}
.login-logo h2{font-size:20px;font-weight:800;color:var(--t1);}

.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--t3);margin-bottom:5px;}
.login-field input{width:100%;padding:12px 14px;border:1px solid var(--bdr);border-radius:var(--rs);font-family:inherit;font-size:15px;color:var(--t1);outline:none;transition:border-color .2s;}

.login-btn{width:100%;padding:13px;border-radius:var(--rs);border:none;background:var(--sky);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:6px;}

.login-btn:disabled{opacity:.5;cursor:default;}

.login-lockout{color:var(--amb);background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.15);}

/* ── TOP BAR ── */
.top-bar{background:#fff;border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05);}

.top-bar h1 span{font-size:22px;}
.top-actions{display:flex;align-items:center;gap:8px;}
.save-btn{padding:10px 24px;border-radius:var(--rs);border:none;background:var(--sky);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.save-btn:hover{background:#0284c7;}.save-btn:active{transform:scale(.97);}
.save-ok{background:var(--grn)!important;}
.logout-btn{padding:10px 16px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;color:var(--red);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.logout-btn:hover{background:rgba(239,68,68,.05);}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:220px;background:#fff;border-left:1px solid var(--bdr);padding:16px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t3);transition:all .15s;border-right:3px solid transparent;}

.sb-item.on{background:var(--skyL);color:var(--sky);border-right-color:var(--sky);font-weight:700;}

.page{display:none;}.page.on{display:block;animation:fadeIn .2s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;display:none;}

.modal{background:#fff;border-radius:var(--r);padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-title{font-size:17px;font-weight:800;color:var(--t1);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--t3);}

.stat .sl{font-size:11px;color:var(--t4);margin-top:4px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#0f172a;color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:13px;font-weight:600;z-index:600;transition:transform .3s ease;display:flex;align-items:center;gap:8px;box-shadow:0 10px 30px rgba(0,0,0,.2);}

.user-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:var(--skyL);color:var(--sky);font-size:11px;font-weight:600;}

<script>
// ═══════════════════════════════════
//  AUTHENTICATION SYSTEM
// ═══════════════════════════════════
var AUTH_KEY='ad_plumbing_auth';
var SESSION_KEY='ad_plumbing_session';
var LOCKOUT_KEY='ad_plumbing_lockout';
var MAX_ATTEMPTS=5;
var LOCKOUT_MINUTES=15;
var SESSION_HOURS=24;

// Default credentials (first time setup)
var DEFAULT_USER='admin';
var DEFAULT_PASS='ad2024';

function getAuth(){
  try{var a=localStorage.getItem(AUTH_KEY);if(a)return JSON.parse(a);}catch(e){}
  // First time: set default credentials
  var def={user:DEFAULT_USER,pass:hashPass(DEFAULT_PASS)};
  localStorage.setItem(AUTH_KEY,JSON.stringify(def));
  return def;
}

function hashPass(p){
  // Simple hash - NOT cryptographic but sufficient for client-side
  var h=0;for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}
  return 'h_'+Math.abs(h).toString(36)+'_'+p.length;
}

function checkLockout(){
  try{
    var lo=localStorage.getItem(LOCKOUT_KEY);
    if(!lo)return false;
    var d=JSON.parse(lo);
    if(d.until>Date.now()){return d;}
    localStorage.removeItem(LOCKOUT_KEY);
  }catch(e){}
  return false;
}

function addFailedAttempt(){
  try{
    var key='ad_plumbing_attempts';
    var a=JSON.parse(localStorage.getItem(key)||'{"count":0,"first":0}');
    if(Date.now()-a.first>LOCKOUT_MINUTES*60*1000){a={count:0,first:Date.now()};}
    a.count++;
    if(a.count===1)a.first=Date.now();
    localStorage.setItem(key,JSON.stringify(a));
    if(a.count>=MAX_ATTEMPTS){
      var until=Date.now()+LOCKOUT_MINUTES*60*1000;
      localStorage.setItem(LOCKOUT_KEY,JSON.stringify({until:until}));
      localStorage.removeItem(key);
      return true; // locked out
    }
    return false;
  }catch(e){return false;}
}

function getFailedCount(){
  try{var a=JSON.parse(localStorage.getItem('ad_plumbing_attempts')||'{"count":0}');return a.count;}catch(e){return 0;}
}

function createSession(){
  var s={token:'s_'+Math.random().toString(36).substr(2)+'_'+Date.now(),expires:Date.now()+SESSION_HOURS*3600*1000};
  localStorage.setItem(SESSION_KEY,JSON.stringify(s));
  return s;
}

function checkSession(){
  try{
    var s=localStorage.getItem(SESSION_KEY);
    if(!s)return false;
    var d=JSON.parse(s);
    if(d.expires>Date.now())return true;
    localStorage.removeItem(SESSION_KEY);
  }catch(e){}
  return false;
}

function doLogin(){
  var errEl=document.getElementById('loginError');
  var lockout=checkLockout();
  if(lockout){
    var mins=Math.ceil((lockout.until-Date.now())/60000);
    errEl.textContent='⏳ החשבון נעול. נסה שוב בעוד '+mins+' דקות.';
    errEl.className='login-error login-lockout';
    errEl.style.display='block';
    return;
  }
  var user=document.getElementById('loginUser').value.trim();
  var pass=document.getElementById('loginPass').value;
  if(!user||!pass){errEl.textContent='⚠️ הזן שם משתמש וסיסמה';errEl.style.display='block';return;}
  var auth=getAuth();
  if(user===auth.user&&hashPass(pass)===auth.pass){
    // Success
    localStorage.removeItem('ad_plumbing_attempts');
    createSession();
    showAdmin(user);
  }else{
    var locked=addFailedAttempt();
    if(locked){
      errEl.textContent='🔒 '+MAX_ATTEMPTS+' ניסיונות כושלים. החשבון ננעל ל-'+LOCKOUT_MINUTES+' דקות.';
      errEl.className='login-error login-lockout';
    }else{
      var remaining=MAX_ATTEMPTS-getFailedCount();
      errEl.textContent='❌ שם משתמש או סיסמה שגויים ('+remaining+' ניסיונות נותרו)';
      errEl.className='login-error';
    }
    errEl.style.display='block';
    document.getElementById('loginPass').value='';
  }
}

function doLogout(){
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').style.display='none';
}

function showAdmin(user){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('adminPanel').style.display='';
  document.getElementById('userBadge').textContent='👤 '+user;
}

// Enter key on login
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('loginUser').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginPass').focus();});

// Check session on load
if(checkSession()){
  var auth=getAuth();
  showAdmin(auth.user);
}

function rDrying(c){var h='<div class="page on"><div class="page-title">⏳ זמני ייבוש</div><div class="page-desc">זמני המתנה לחומרים</div><div class="section-card"><div class="item-list">';(data.drying||[]).forEach(function(d,i){h+='<div class="item-row"><div class="ir-name">'+esc(d.name)+'</div><div class="ir-meta"><span style="color:#0ea5e9;font-weight:700">'+esc(d.wait)+'</span><span style="color:#94a3b8">→ '+esc(d.full)+'</span></div><button class="btn btn-sm btn-sky" onclick="editD('+i+')">✏️</button><button class="btn btn-sm btn-red" onclick="delD('+i+')">🗑️</button></div>';});h+='</div><button class="add-btn" onclick="addD()">+ חומר</button></div></div>';c.innerHTML=h;}
function editD(i){var d=data.drying[i];openModal('<div class="modal-title"><span>✏️</span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="form-group"><label>חומר</label><input id="d-n" value="'+esc(d.name)+'"></div><div class="form-row"><div class="form-group"><label>המתנה</label><input id="d-w" value="'+esc(d.wait)+'"></div><div class="form-group"><label>ייבוש מלא</label><input id="d-f" value="'+esc(d.full)+'"></div></div><div class="modal-actions"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn btn-sky" onclick="svD('+i+')">💾</button></div>');}
function svD(i){data.drying[i]={name:document.getElementById('d-n').value,wait:document.getElementById('d-w').value,full:document.getElementById('d-f').value};closeModal();rDrying(document.getElementById('content'));showToast('✅');}
function delD(i){if(confirm('למחוק?')){data.drying.splice(i,1);rDrying(document.getElementById('content'));showToast('🗑️');}}
function addD(){openModal('<div class="modal-title"><span>+</span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="form-group"><label>חומר</label><input id="d-n"></div><div class="form-row"><div class="form-group"><label>המתנה</label><input id="d-w"></div><div class="form-group"><label>ייבוש מלא</label><input id="d-f"></div></div><div class="modal-actions"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn btn-grn" onclick="doAddD()">+</button></div>');}
function doAddD(){data.drying.push({name:document.getElementById('d-n').value,wait:document.getElementById('d-w').value,full:document.getElementById('d-f').value});closeModal();rDrying(document.getElementById('content'));showToast('✅');}

function rStandards(c){c.innerHTML='<div class="page on"><div class="page-title">📐 תקנים</div><div class="page-desc">ערכים קבועים לפי ת"י 1205</div><div class="section-card"><div style="font-size:13px;color:#475569;line-height:2"><strong>שיפועים:</strong><br>• 2" (50מ"מ): 2.0%-5.0%<br>• 3" (75מ"מ): 1.5%-3.0%<br>• 4" (110מ"מ): 1.5%-2.0%<br>• 6" (160מ"מ): 1.0%-1.5%<br><br><strong>אוורור:</strong><br>• אסלה: 3.0מ\' (FU=4)<br>• כיור: 1.5מ\' (FU=1)<br>• מקלחת/מטבח: 2.5מ\' (FU=2)<br><br><strong>לחצים:</strong><br>• מינימום: 1.0 בר<br>• מקסימום: 5.0 בר<br>• 10מ\' = 1 בר</div></div><div style="padding:12px;font-size:11px;color:#94a3b8;text-align:center">ערכים קבועים — לא ניתנים לעריכה</div></div>';}

// ═══════════════════════════════════
//  SECURITY PAGE

function rSecurity(c){
  var auth=getAuth();
  c.innerHTML='<div class="page on"><div class="page-title">🔐 אבטחה</div><div class="page-desc">ניהול שם משתמש, סיסמה והגדרות אבטחה</div>'
    +'<div class="section-card"><div class="sc-title">👤 שינוי שם משתמש</div><div class="form-group" style="margin-top:12px"><label>שם משתמש נוכחי</label><input value="'+esc(auth.user)+'" disabled style="background:#f1f5f9;color:#94a3b8"></div><div class="form-group"><label>שם משתמש חדש</label><input id="sec-newuser" placeholder="הזן שם חדש"></div><div style="margin-top:12px"><button class="btn btn-sky" onclick="changeUser()">💾 עדכן שם משתמש</button></div></div>'
    +'<div class="section-card"><div class="sc-title">🔑 שינוי סיסמה</div><div class="form-group" style="margin-top:12px"><label>סיסמה נוכחית</label><input type="password" id="sec-oldpass" placeholder="סיסמה נוכחית"></div><div class="form-group"><label>סיסמה חדשה</label><input type="password" id="sec-newpass" placeholder="סיסמה חדשה (לפחות 4 תווים)"></div><div class="form-group"><label>אימות סיסמה חדשה</label><input type="password" id="sec-newpass2" placeholder="הזן שוב"></div><div style="margin-top:12px"><button class="btn btn-sky" onclick="changePass()">🔑 עדכן סיסמה</button></div></div>'
    +'<div class="section-card"><div class="sc-title">🛡️ מידע אבטחה</div><div style="font-size:13px;color:#475569;line-height:1.8;margin-top:8px">• <strong>נעילה אוטומטית:</strong> אחרי '+MAX_ATTEMPTS+' ניסיונות כושלים החשבון ננעל ל-'+LOCKOUT_MINUTES+' דקות<br>• <strong>תוקף הפעלה:</strong> '+SESSION_HOURS+' שעות — אחרי זה צריך להתחבר מחדש<br>• <strong>הסיסמה מוצפנת</strong> ב-localStorage ולא נשמרת בטקסט גלוי</div></div>'
    +'</div>';
}

function changeUser(){
  var newUser=document.getElementById('sec-newuser').value.trim();
  if(!newUser||newUser.length<3){showToast('⚠️ שם משתמש חייב להכיל לפחות 3 תווים');return;}
  var auth=getAuth();
  auth.user=newUser;
  localStorage.setItem(AUTH_KEY,JSON.stringify(auth));
  document.getElementById('userBadge').textContent='👤 '+newUser;
  showToast('✅ שם משתמש עודכן ל: '+newUser);
  rSecurity(document.getElementById('content'));
}

function changePass(){
  var oldP=document.getElementById('sec-oldpass').value;
  var newP=document.getElementById('sec-newpass').value;
  var newP2=document.getElementById('sec-newpass2').value;
  var auth=getAuth();
  if(hashPass(oldP)!==auth.pass){showToast('❌ סיסמה נוכחית שגויה');return;}
  if(newP.length<4){showToast('⚠️ סיסמה חדשה חייבת להכיל לפחות 4 תווים');return;}
  if(newP!==newP2){showToast('⚠️ הסיסמאות לא תואמות');return;}
  auth.pass=hashPass(newP);
  localStorage.setItem(AUTH_KEY,JSON.stringify(auth));
  showToast('✅ סיסמה עודכנה בהצלחה');
  rSecurity(document.getElementById('content'));
}

// ── SETTINGS ──
function rSettings(c){var s=data.settings||DEFAULTS.settings;c.innerHTML='<div class="page on"><div class="page-title">⚙️ הגדרות</div><div class="page-desc">הגדרות כלליות</div><div class="section-card"><div class="sc-title">פרטי העסק</div><div class="form-group" style="margin-top:12px"><label>שם העסק</label><input id="st-n" value="'+esc(s.businessName)+'" onchange="data.settings.businessName=this.value"></div><div class="form-group"><label>טלפון</label><input id="st-p" value="'+esc(s.phone||'')+'" placeholder="050-0000000" onchange="data.settings.phone=this.value"></div><div class="form-group"><label>פתיח ווטסאפ</label><input id="st-w" value="'+esc(s.whatsappPrefix)+'" onchange="data.settings.whatsappPrefix=this.value"></div></div><div class="section-card"><div class="sc-title">נתונים</div><div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="btn btn-sky" onclick="exportData()">📤 ייצוא JSON</button><button class="btn" onclick="document.getElementById(\'impF\').click()">📥 ייבוא</button><input type="file" id="impF" accept=".json" style="display:none" onchange="importData(event)"><button class="btn btn-red" onclick="resetToDefaults()">↺ אפס</button></div></div></div>';}
function exportData(){var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ad-plumbing-data.json';a.click();showToast('📤 יוצא');}
function importData(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{data=JSON.parse(ev.target.result);saveAll();renderPage(curPage);showToast('📥 יובא');}catch(err){showToast('❌ קובץ לא תקין');}};r.readAsText(f);}

// ── INIT ──
loadData();initNav();renderPage('dashboard');
</script>
